<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="vexfit-logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Vexfit – Trainer Profil</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--black:#080808;--white:#f4f4ef;--accent:#e8ff00;--gray:#111;--mid:#1a1a1a;--card:#141414;--muted:#555;--muted-l:#888;--border:rgba(255,255,255,0.07);--border-i:rgba(255,255,255,0.13);--green:#4ade80;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
a{text-decoration:none;color:inherit}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(8,8,8,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;color:var(--white)}
.logo span{color:var(--accent)}
.btn-back{background:none;border:1px solid var(--border);color:var(--muted-l);padding:7px 14px;border-radius:3px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-back:hover{color:var(--white);border-color:rgba(255,255,255,.25)}
.content{padding:80px 20px 80px;max-width:600px;margin:0 auto}
.loader{position:fixed;inset:0;background:var(--black);z-index:999;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
.loader.hidden{opacity:0;pointer-events:none}
.spinner{width:30px;height:30px;border:2px solid var(--border-i);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.profile-page{animation:fadeUp .35s ease both}
.avatar{width:80px;height:80px;border-radius:50%;background:var(--mid);border:2px solid rgba(232,255,0,.2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:28px;color:rgba(232,255,0,.5);margin-bottom:16px}
.trainer-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,9vw,56px);letter-spacing:2px;line-height:1;margin-bottom:6px}
.trainer-meta{font-size:13px;color:var(--muted-l);font-weight:300;margin-bottom:20px}
.tags-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}
.tag{padding:5px 12px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:100px;font-size:12px;color:var(--muted-l)}
.section-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.bio-text{font-size:14px;color:rgba(244,244,239,.8);line-height:1.8;font-weight:300;margin-bottom:24px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.info-box{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:16px}
.info-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.info-value{font-size:14px;color:var(--white);font-weight:500}
.divider{height:1px;background:var(--border);margin:20px 0}
.btn-anfragen{width:100%;background:var(--accent);color:var(--black);padding:15px;border:none;border-radius:3px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;margin-bottom:10px}
.btn-anfragen:hover{opacity:.88}
.btn-calendly{width:100%;background:none;border:1px solid var(--border-i);color:var(--white);padding:14px;border-radius:3px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;display:block;text-align:center}
.btn-calendly:hover{border-color:rgba(255,255,255,.3)}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--gray);border:1px solid var(--border-i);border-radius:6px 6px 0 0;padding:24px 20px 40px;width:100%;max-width:520px;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1.5px;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--muted-l);margin-bottom:16px}
.modal-info{background:var(--card);border:1px solid var(--border);padding:12px;border-radius:3px;margin-bottom:14px;font-size:13px;color:var(--muted-l)}
.modal-info strong{color:var(--white);display:block;font-size:16px;margin-bottom:2px}
.modal-textarea{background:var(--card);border:1px solid var(--border-i);color:var(--white);padding:12px 15px;font-family:'DM Sans',sans-serif;font-size:14px;border-radius:3px;outline:none;width:100%;min-height:90px;line-height:1.6;resize:vertical;-webkit-appearance:none}
.modal-textarea:focus{border-color:rgba(232,255,0,.4)}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.btn-cancel{background:none;border:1px solid var(--border);color:var(--muted-l);padding:12px;border-radius:3px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.btn-send{background:var(--accent);color:var(--black);padding:12px;border:none;border-radius:3px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.btn-send:disabled{opacity:.5;cursor:not-allowed}
.alert-ok{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:var(--green);padding:11px 14px;border-radius:3px;font-size:13px;display:none;margin-bottom:10px}
.alert-ok.show{display:block}
@media(min-width:640px){nav{padding:0 48px}.content{padding:80px 48px 80px}.info-grid{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="spinner"></div></div>
<nav>
  <a href="kunden-bereich.html" class="logo">VEX<span>FIT</span></a>
  <button class="btn-back" onclick="history.back()">← Zurück</button>
</nav>
<div class="content">
  <div id="profileContent"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal">
    <div class="modal-title">Trainer anfragen</div>
    <div class="modal-sub">Deine Anfrage wird direkt übermittelt.</div>
    <div class="modal-info" id="modalInfo"></div>
    <div class="alert-ok" id="sentOk">✓ Anfrage gesendet!</div>
    <textarea class="modal-textarea" id="modalMsg" placeholder="Kurz vorstellen: Ziele, Verfügbarkeit..."></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeOverlay()">Abbrechen</button>
      <button class="btn-send" id="sendBtn" onclick="sendAnfrage()">Senden →</button>
    </div>
  </div>
</div>

<script>
const SB  = 'https://hbapzwxdehfgnputrfjf.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhiYXB6d3hkZWhmZ25wdXRyZmpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NDc0NzQsImV4cCI6MjA5NDQyMzQ3NH0.vIQLcTObF5tmBEuxKL2EEUd4U88k0mdTmsAafG8djN4';
const H   = {'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};

// Auth check
const raw = localStorage.getItem('vexfit_session');
let sess = null;
if (raw) { try { sess = JSON.parse(raw); } catch(e) {} }
if (!sess || !sess.email || sess.role !== 'kunde') { location.href = 'login.html'; throw ''; }

let T = null, K = null;

// Get trainer ID from URL
const params = new URLSearchParams(location.search);
const trainerId = params.get('id');
if (!trainerId) { location.href = 'kunden-bereich.html'; throw ''; }

loadData();

async function loadData() {
  try {
    const [trainerRes, kundeRes] = await Promise.all([
      fetch(SB+'/rest/v1/trainers?id=eq.'+trainerId+'&select=*', {headers:H}),
      fetch(SB+'/rest/v1/kunden?email=eq.'+encodeURIComponent(sess.email)+'&select=*', {headers:H})
    ]);
    const tData = await trainerRes.json();
    const kData = await kundeRes.json();
    if (!tData || tData.length === 0) { document.getElementById('profileContent').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--muted-l)">Trainer nicht gefunden.</div>'; return; }
    T = tData[0];
    K = kData && kData.length > 0 ? kData[0] : null;
    renderProfile();
  } catch(e) {
    document.getElementById('profileContent').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--muted-l)">Fehler beim Laden.</div>';
  } finally {
    document.getElementById('loader').classList.add('hidden');
  }
}

function renderProfile() {
  const fn = T.vorname || '?';
  const ln = T.nachname || '?';
  const initials = (fn[0]+ln[0]).toUpperCase();
  const loc = T.trainingsart === 'Online' ? '🌐 Online' : (T.stadt ? '📍 '+T.stadt : '');
  const tags = (T.spezialisierungen||[]).map(s=>'<span class="tag">'+s+'</span>').join('');

  document.getElementById('profileContent').innerHTML = `
    <div class="profile-page">
      <div class="avatar">${initials}</div>
      <div class="trainer-name">${fn} ${ln}</div>
      <div class="trainer-meta">${[loc, T.trainingsart, T.erfahrung].filter(Boolean).join(' · ')}</div>
      ${tags ? '<div class="tags-row">'+tags+'</div>' : ''}
      ${T.bio ? '<div class="section-label">Über mich</div><div class="bio-text">'+T.bio+'</div>' : ''}
      <div class="info-grid">
        ${T.preis_stunde ? '<div class="info-box"><div class="info-label">Preis</div><div class="info-value">€'+T.preis_stunde+' / Monat</div></div>' : ''}
        ${T.preis_online ? '<div class="info-box"><div class="info-label">Online Coaching</div><div class="info-value">€'+T.preis_online+' / Monat</div></div>' : ''}
        ${T.erfahrung ? '<div class="info-box"><div class="info-label">Erfahrung</div><div class="info-value">'+T.erfahrung+'</div></div>' : ''}
        ${T.zertifikate ? '<div class="info-box"><div class="info-label">Zertifikate</div><div class="info-value">'+T.zertifikate+'</div></div>' : ''}
      </div>
      <div class="divider"></div>
      <button class="btn-anfragen" onclick="openModal()">Trainer anfragen →</button>
      ${T.calendly ? '<a href="'+T.calendly+'" target="_blank" class="btn-calendly">📅 Termin buchen via Calendly</a>' : ''}
    </div>`;
  document.getElementById('modalInfo').innerHTML = '<strong>'+fn+' '+ln+'</strong>'+(loc ? loc : '');
}

function openModal() {
  document.getElementById('modalMsg').value = '';
  document.getElementById('sentOk').classList.remove('show');
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('sendBtn').textContent = 'Senden →';
  document.getElementById('overlay').classList.add('open');
}

function closeOverlay(e) {
  if (!e || e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
  }
}

async function sendAnfrage() {
  if (!T) return;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true; btn.textContent = 'Wird gesendet...';
  const kundenName = K ? ((K.vorname||'')+' '+(K.nachname||'')).trim() : '';
  const body = {
    trainer_email: T.email,
    trainer_name: (T.vorname+' '+T.nachname).trim(),
    kunden_email: sess.email,
    kunden_name: kundenName,
    ziel: K ? (K.ziel||'') : '',
    nachricht: document.getElementById('modalMsg').value.trim(),
    status: 'ausstehend',
    weitergeleitet: false
  };
  try {
    await fetch(SB+'/rest/v1/anfragen', {method:'POST', headers:{...H,'Prefer':'return=minimal'}, body:JSON.stringify(body)});
    fetch('https://n8n.srv1551518.hstgr.cloud/webhook/neue-anfrage', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).catch(()=>{});
    document.getElementById('sentOk').classList.add('show');
    document.getElementById('modalMsg').style.display = 'none';
    btn.textContent = '✓ Gesendet';
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Senden →';
    alert('Fehler beim Senden. Bitte erneut versuchen.');
  }
}
</script>
</body>
</html>
