<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="vexfit-logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Vexfit – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --black:#080808;
  --white:#f4f4ef;
  --accent:#e8ff00;
  --gray:#111111;
  --mid:#1a1a1a;
  --card:#141414;
  --muted:#555;
  --muted-light:#888;
  --border:rgba(255,255,255,0.07);
  --border-i:rgba(255,255,255,0.13);
  --red:#ff4d4d;
  --green:#4ade80;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}

/* LAYOUT */
.page{min-height:100vh;display:flex;flex-direction:column}
.top-bar{padding:20px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--white)}
.logo span{color:var(--accent)}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:20px 20px 60px}
.box{width:100%;max-width:400px}

/* ROLE SWITCHER */
.role-toggle{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:4px;padding:3px;margin-bottom:28px}
.role-btn{padding:11px;border:none;background:none;color:var(--muted-light);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all 0.2s}
.role-btn.active{background:var(--mid);color:var(--white)}
.role-btn .role-icon{display:block;font-size:20px;margin-bottom:4px}

/* MODE SWITCHER */
.mode-tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border)}
.mode-tab{flex:1;padding:12px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;margin-bottom:-1px}
.mode-tab.active{color:var(--white);border-bottom-color:var(--accent)}

/* HEADLINE */
.headline{margin-bottom:24px}
.headline h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,8vw,48px);letter-spacing:2px;line-height:1;margin-bottom:6px}
.headline p{font-size:13px;color:var(--muted-light);font-weight:300;line-height:1.6}

/* FORM */
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input{width:100%;background:var(--card);border:1px solid var(--border-i);color:var(--white);padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:14px;border-radius:3px;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
.field input::placeholder{color:rgba(85,85,85,0.6)}
.field input:focus{border-color:rgba(232,255,0,0.5);background:var(--mid)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ALERT */
.alert{padding:11px 14px;border-radius:3px;font-size:13px;margin-bottom:16px;display:none;line-height:1.5}
.alert.show{display:block}
.alert-err{background:rgba(255,77,77,0.1);border:1px solid rgba(255,77,77,0.3);color:var(--red)}
.alert-ok{background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2);color:var(--green)}

/* BTN */
.btn-primary{width:100%;background:var(--accent);color:var(--black);padding:15px;border:none;border-radius:3px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:6px;transition:opacity 0.2s}
.btn-primary:hover{opacity:0.88}
.btn-primary:disabled{opacity:0.45;cursor:not-allowed}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin:20px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:11px;color:var(--muted);white-space:nowrap}

/* FOOTER */
.foot{padding:28px 24px;text-align:center;font-size:12px;color:var(--muted)}

/* LOADER OVERLAY */
.loader{position:fixed;inset:0;background:rgba(8,8,8,0.85);z-index:999;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.loader.show{display:flex}
.spinner{width:32px;height:32px;border:2px solid var(--border-i);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:380px){.field-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="spinner"></div></div>
<div class="page">
  <div class="top-bar">
    <div class="logo">VEX<span>FIT</span></div>
    <div style="font-size:12px;color:var(--muted)">DACH · AT · DE · CH</div>
  </div>

  <div class="main">
    <div class="box">

      <!-- ROLE TOGGLE -->
      <div class="role-toggle">
        <button class="role-btn active" id="roleKunde" onclick="setRole('kunde')">
          <span class="role-icon">🏃</span>Ich suche einen Trainer
        </button>
        <button class="role-btn" id="roleTrainer" onclick="setRole('trainer')">
          <span class="role-icon">💪</span>Ich bin Trainer
        </button>
      </div>

      <!-- MODE TABS -->
      <div class="mode-tabs">
        <button class="mode-tab active" id="tabLogin" onclick="setMode('login')">Einloggen</button>
        <button class="mode-tab" id="tabRegister" onclick="setMode('register')">Registrieren</button>
      </div>

      <!-- HEADLINE -->
      <div class="headline" id="headline">
        <h1 id="headlineTitle">Willkommen zurück</h1>
        <p id="headlineSub">Logge dich mit deiner E-Mail ein.</p>
      </div>

      <!-- ALERTS -->
      <div class="alert alert-err" id="alertErr"></div>
      <div class="alert alert-ok" id="alertOk"></div>

      <!-- REGISTER EXTRA FIELDS (hidden in login mode) -->
      <div id="registerFields" style="display:none">
        <div class="field-row">
          <div class="field"><label>Vorname</label><input type="text" id="regFn" placeholder="Max" autocomplete="given-name"></div>
          <div class="field"><label>Nachname</label><input type="text" id="regLn" placeholder="Mustermann" autocomplete="family-name"></div>
        </div>
      </div>

      <!-- ALWAYS VISIBLE -->
      <div class="field"><label>E-Mail</label><input type="email" id="email" placeholder="deine@email.com" autocomplete="email"></div>
      <div class="field"><label>Passwort</label><input type="password" id="password" placeholder="Mindestens 8 Zeichen" autocomplete="current-password"></div>

      <button class="btn-primary" id="submitBtn" onclick="submit()">Einloggen →</button>

      <div class="divider"><span>oder</span></div>
      <div style="text-align:center;font-size:13px;color:var(--muted)">
        <span id="switchText">Noch kein Konto?</span>
        <a href="#" id="switchLink" onclick="toggleMode(event)" style="color:var(--accent);margin-left:6px;font-weight:500">Jetzt registrieren</a>
      </div>

    </div>
  </div>

  <div class="foot">Vexfit · Dein Personal Trainer Marktplatz · <a href="mailto:vexfit.info@gmail.com" style="color:var(--muted-light)">Support</a></div>
</div>

<script>
const SB   = 'https://hbapzwxdehfgnputrfjf.supabase.co';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhiYXB6d3hkZWhmZ25wdXRyZmpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NDc0NzQsImV4cCI6MjA5NDQyMzQ3NH0.vIQLcTObF5tmBEuxKL2EEUd4U88k0mdTmsAafG8djN4';
const HEADERS = { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' };

let currentRole = 'kunde'; // 'kunde' | 'trainer'
let currentMode = 'login'; // 'login' | 'register'

// ── Redirect if already logged in ──
const existingSession = localStorage.getItem('vexfit_session');
if (existingSession) {
  try {
    const s = JSON.parse(existingSession);
    if (s && s.email && s.role) {
      window.location.href = s.role === 'trainer' ? 'trainer-bereich.html' : 'kunden-bereich.html';
    }
  } catch(e) { localStorage.removeItem('vexfit_session'); }
}

function setRole(role) {
  currentRole = role;
  document.getElementById('roleKunde').classList.toggle('active', role === 'kunde');
  document.getElementById('roleTrainer').classList.toggle('active', role === 'trainer');
  updateHeadline();
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
  document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
  document.getElementById('registerFields').style.display = mode === 'register' ? 'block' : 'none';
  document.getElementById('submitBtn').textContent = mode === 'login' ? 'Einloggen →' : 'Konto erstellen →';
  document.getElementById('switchText').textContent = mode === 'login' ? 'Noch kein Konto?' : 'Schon registriert?';
  document.getElementById('switchLink').textContent = mode === 'login' ? 'Jetzt registrieren' : 'Einloggen';
  clearAlerts();
  updateHeadline();
}

function toggleMode(e) {
  e.preventDefault();
  setMode(currentMode === 'login' ? 'register' : 'login');
}

function updateHeadline() {
  const titles = {
    login: { kunde: 'Willkommen zurück', trainer: 'Trainer-Login' },
    register: { kunde: 'Konto erstellen', trainer: 'Als Trainer starten' }
  };
  const subs = {
    login: { kunde: 'Logge dich mit deiner E-Mail ein.', trainer: 'Logge dich mit deiner E-Mail ein.' },
    register: { kunde: 'Finde deinen Personal Trainer im DACH-Raum.', trainer: 'Erstelle dein Trainer-Profil — kostenlos bis zum ersten Kunden.' }
  };
  document.getElementById('headlineTitle').textContent = titles[currentMode][currentRole];
  document.getElementById('headlineSub').textContent   = subs[currentMode][currentRole];
}

function clearAlerts() {
  document.getElementById('alertErr').classList.remove('show');
  document.getElementById('alertOk').classList.remove('show');
}

function showErr(msg) {
  const el = document.getElementById('alertErr');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('alertOk').classList.remove('show');
}

function showOk(msg) {
  const el = document.getElementById('alertOk');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('alertErr').classList.remove('show');
}

function loading(on) {
  document.getElementById('loader').classList.toggle('show', on);
  document.getElementById('submitBtn').disabled = on;
}

async function submit() {
  clearAlerts();
  const email    = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;

  if (!email || !email.includes('@')) return showErr('Bitte eine gültige E-Mail-Adresse eingeben.');
  if (!password || password.length < 8) return showErr('Passwort muss mindestens 8 Zeichen haben.');

  if (currentMode === 'register') {
    const fn = document.getElementById('regFn').value.trim();
    const ln = document.getElementById('regLn').value.trim();
    if (!fn || !ln) return showErr('Bitte Vor- und Nachname eingeben.');
    await doRegister(email, password, fn, ln);
  } else {
    await doLogin(email, password);
  }
}

async function doRegister(email, password, fn, ln) {
  loading(true);
  try {
    const table = currentRole === 'trainer' ? 'trainers' : 'kunden';

    // Check if email already exists
    const checkRes = await fetch(`${SB}/rest/v1/${table}?email=eq.${encodeURIComponent(email)}&select=id`, { headers: HEADERS });
    const checkData = await checkRes.json();
    if (checkData && checkData.length > 0) {
      loading(false);
      return showErr('Diese E-Mail ist bereits registriert. Bitte einloggen.');
    }

    // Create record
    const body = currentRole === 'trainer'
      ? { email, passwort: password, vorname: fn, nachname: ln, aktiv: false, stripe_bezahlt: false, spezialisierungen: [] }
      : { email, passwort: password, vorname: fn, nachname: ln };

    const res = await fetch(`${SB}/rest/v1/${table}`, {
      method: 'POST',
      headers: { ...HEADERS, 'Prefer': 'return=representation' },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      loading(false);
      return showErr(err.message || 'Registrierung fehlgeschlagen. Bitte erneut versuchen.');
    }

    const data = await res.json();
    const user = data[0];
    saveSession(email, password, currentRole, user.id);
    showOk('Konto erstellt! Weiterleitung...');
    setTimeout(() => redirect(), 800);

  } catch(e) {
    loading(false);
    showErr('Verbindungsfehler. Bitte erneut versuchen.');
  }
}

async function doLogin(email, password) {
  loading(true);
  try {
    const table = currentRole === 'trainer' ? 'trainers' : 'kunden';
    const res = await fetch(`${SB}/rest/v1/${table}?email=eq.${encodeURIComponent(email)}&passwort=eq.${encodeURIComponent(password)}&select=*`, { headers: HEADERS });
    const data = await res.json();

    if (!data || data.length === 0) {
      loading(false);
      return showErr('E-Mail oder Passwort falsch. Bitte erneut versuchen.');
    }

    const user = data[0];
    saveSession(email, password, currentRole, user.id);
    showOk('Anmeldung erfolgreich! Weiterleitung...');
    setTimeout(() => redirect(), 600);

  } catch(e) {
    loading(false);
    showErr('Verbindungsfehler. Bitte erneut versuchen.');
  }
}

function saveSession(email, password, role, id) {
  localStorage.setItem('vexfit_session', JSON.stringify({ email, password, role, id, ts: Date.now() }));
}

function redirect() {
  window.location.href = currentRole === 'trainer' ? 'trainer-bereich.html' : 'kunden-bereich.html';
}

// Enter key support
document.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
</script>
</body>
</html>
