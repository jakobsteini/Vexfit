<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vexfit Ad – Schmerz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Sans',sans-serif}
.story{width:405px;height:720px;background:#0a0a0a;position:relative;overflow:hidden;border-radius:12px;box-shadow:0 40px 100px rgba(0,0,0,0.8)}
.bg-glow{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(232,255,0,0.08) 0%,transparent 70%);pointer-events:none}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.bg-grid::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 100% 100% at 50% 50%,transparent 30%,#0a0a0a 100%)}

.top{position:absolute;top:0;left:0;right:0;padding:52px 32px 0;z-index:10;animation:fadeDown 0.8s 0.1s ease both}

.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.25);color:#ff6b6b;padding:6px 14px;border-radius:100px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
.badge-dot{width:6px;height:6px;background:#ff6b6b;border-radius:50%;animation:blink 1.5s infinite}

.headline{font-family:'Bebas Neue',sans-serif;font-size:62px;line-height:0.88;letter-spacing:2px;color:#f5f5f0}
.headline em{font-style:normal;color:#e8ff00;display:block}

.problems{position:absolute;top:300px;left:32px;right:32px;z-index:10;display:flex;flex-direction:column;gap:12px;animation:fadeUp 0.7s 0.3s ease both}

.prob-item{display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:6px}
.prob-x{width:26px;height:26px;background:rgba(255,80,80,0.12);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;color:#ff6b6b;font-weight:700}
.prob-text{font-size:14px;color:rgba(245,245,240,0.6);font-weight:300}

/* SOLUTION */
.solution{position:absolute;bottom:120px;left:32px;right:32px;z-index:10;animation:fadeUp 0.8s 0.5s ease both}
.sol-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#e8ff00;font-weight:600;margin-bottom:8px}
.sol-text{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:2px;line-height:0.95;color:#f5f5f0}
.sol-text span{color:#e8ff00}

/* LINK PLACEHOLDER */
.link-area{position:absolute;bottom:28px;left:32px;right:32px;height:52px;border:1px dashed rgba(255,255,255,0.1);border-radius:4px;display:flex;align-items:center;justify-content:center;z-index:10}
.link-hint{font-size:11px;color:rgba(255,255,255,0.15);letter-spacing:1.5px;text-transform:uppercase}

.anzeige{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,0.15);letter-spacing:2px;text-transform:uppercase;z-index:20;white-space:nowrap}

@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<div class="story">
  <div class="bg-glow"></div>
  <div class="bg-grid"></div>

  <div class="top">
    <div class="badge"><div class="badge-dot"></div>Kennst du das?</div>
    <div class="headline">ALLEINE<br>KOMMT MAN<br><em>NICHT WEIT.</em></div>
  </div>

  <div class="problems">
    <div class="prob-item"><div class="prob-x">✕</div><div class="prob-text">Kein Plan – keine Ergebnisse</div></div>
    <div class="prob-item"><div class="prob-x">✕</div><div class="prob-text">Motivation weg nach 2 Wochen</div></div>
    <div class="prob-item"><div class="prob-x">✕</div><div class="prob-text">Keiner der dir wirklich hilft</div></div>
  </div>

  <div class="solution">
    <div class="sol-label">Die Lösung</div>
    <div class="sol-text">DEIN TRAINER.<br><span>AUF VEXFIT.</span></div>
  </div>

  <div class="link-area"><div class="link-hint">← Dein Link hier →</div></div>
  <div class="anzeige">Anzeige</div>
</div>
</body>
</html>
