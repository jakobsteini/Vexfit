<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="vexfit-logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Vexfit – Personal Trainer Marktplatz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;color:#f4f4ef;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap');
.logo{font-family:'Bebas Neue',cursive;font-size:32px;letter-spacing:6px}
.logo span{color:#e8ff00}
</style>
</head>
<body>
<div class="logo">VEX<span>FIT</span></div>
<script>
const session = localStorage.getItem('vexfit_session');
if (session) {
  try {
    const s = JSON.parse(session);
    if (s && s.email && s.role) {
      window.location.href = s.role === 'trainer' ? 'trainer-bereich.html' : 'kunden-bereich.html';
    } else {
      window.location.href = 'login.html';
    }
  } catch(e) {
    localStorage.removeItem('vexfit_session');
    window.location.href = 'login.html';
  }
} else {
  window.location.href = 'login.html';
}
</script>
</body>
</html>
