<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="icon" type="image/png" href="vexfit-logo.png">
<title>Vexfit – Passwort vergessen</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--black:#0a0a0a;--white:#f5f5f0;--accent:#e8ff00;--gray:#141414;--card:#161616;--text-muted:#666;--border:rgba(255,255,255,0.07);--border-input:rgba(255,255,255,0.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--white);text-decoration:none}.logo span{color:var(--accent)}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:rgba(10,10,10,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-back{color:var(--text-muted);text-decoration:none;font-size:13px}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:90px 20px 40px}
.box{width:100%;max-width:400px;animation:fadeUp 0.6s ease both}
.label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:10px;text-align:center}
.title{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:0.95;letter-spacing:2px;margin-bottom:8px;text-align:center}
.sub{font-size:14px;color:var(--text-muted);font-weight:300;margin-bottom:28px;text-align:center;line-height:1.6}
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted)}
input{background:var(--card);border:1px solid var(--border-input);color:var(--white);padding:14px 16px;font-family:'DM Sans',sans-serif;font-size:15px;border-radius:3px;outline:none;transition:border-color 0.2s;width:100%}
input:focus{border-color:rgba(232,255,0,0.4)}
.alert{padding:12px 16px;border-radius:3px;font-size:13px;margin-bottom:14px;display:none}.alert.show{display:block}
.alert-error{background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.3);color:#ff6b6b}
.btn{width:100%;background:var(--accent);color:var(--black);padding:15px;border:none;border-radius:3px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;margin-bottom:16px}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.back-link{text-align:center;font-size:14px;color:var(--text-muted)}.back-link a{color:var(--accent);text-decoration:none;font-weight:600}
.success{display:none;text-align:center;padding:16px 0}
.success-icon{font-size:44px;margin-bottom:14px}
.success h3{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;margin-bottom:8px}
.success h3 span{color:var(--accent)}
.success p{font-size:14px;color:var(--text-muted);font-weight:300;line-height:1.6;margin-bottom:20px}
.success a{background:var(--accent);color:var(--black);padding:13px 28px;border-radius:3px;font-weight:700;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;display:inline-block}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<nav><a href="index.html" class="logo">VEX<span>FIT</span></a><a href="login.html" class="nav-back">← Login</a></nav>
<div class="wrap"><div class="box">
  <div id="formSection">
    <div class="label">Passwort vergessen?</div>
    <div class="title">ZURÜCKSETZEN</div>
    <p class="sub">Gib deine E-Mail ein. Wir schicken dir einen Reset-Link direkt von Supabase.</p>
    <div class="alert alert-error" id="errMsg"></div>
    <div class="field"><label>E-Mail</label><input type="email" placeholder="deine@email.com" id="reset-email" onkeydown="if(event.key==='Enter')submit()"></div>
    <button class="btn" id="resetBtn" onclick="submit()">Reset-Link senden →</button>
    <div class="back-link">Passwort erinnerst du dich? <a href="login.html">Login</a></div>
  </div>
  <div class="success" id="successSection">
    <div class="success-icon">📬</div>
    <h3>E-MAIL<br><span>GESENDET!</span></h3>
    <p>Wir haben dir einen Reset-Link geschickt. Bitte prüfe deinen Posteingang – auch Spam!</p>
    <a href="login.html">Zurück zum Login</a>
  </div>
</div></div>
<script>
const SUPABASE_URL = 'https://hbapzwxdehfgnputrfjf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhiYXB6d3hkZWhmZ25wdXRyZmptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NDc0NzQsImV4cCI6MjA5NDQyMzQ3NH0.vIQLcTObF5tmBEuxKL2EEUd4U88k0mdTmsAafG8djN4';

async function submit() {
  const email = document.getElementById('reset-email').value.trim();
  if(!email) { showErr('Bitte E-Mail eingeben!'); return; }
  const btn = document.getElementById('resetBtn');
  btn.disabled = true; btn.textContent = 'Wird gesendet...';
  try {
    await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'apikey': SUPABASE_KEY},
      body: JSON.stringify({email, redirectTo: 'https://vexfit.app/trainer-bereich.html'})
    });
    document.getElementById('formSection').style.display = 'none';
    document.getElementById('successSection').style.display = 'block';
  } catch(e) {
    showErr('Fehler. Bitte versuche es erneut.');
    btn.disabled = false; btn.textContent = 'Reset-Link senden →';
  }
}
function showErr(msg) { const e = document.getElementById('errMsg'); e.textContent = '⚠️ ' + msg; e.classList.add('show'); }
</script>
